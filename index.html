<form action="TU_ENLACE_DE_FORMSPREE_AQUÍ" method="POST">
                        <div class="form-group">
                            <label for="nombre">Nombre Completo</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="correo">Correo Electrónico</label>
                            <input type="email" id="correo" name="_replyto" placeholder="tu@correo.com" required>
                        </div>
                        <div class="form-group">
                            <label for="telefono">Teléfono / WhatsApp</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="Ej: +57 300 123 4567">
                        </div>
                        <div class="form-group">
                            <label for="asunto">Asunto</label>
                            <input type="text" id="asunto" name="_subject" placeholder="Motivo de tu mensaje" required>
                        </div>
                        <div class="form-group">
                            <label for="mensaje">Mensaje o Consulta</label>
                            <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                        </div>
                        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                    </form>
                </div>

                <div>
                    <h3>Canales de Atención</h3>
                    <ul class="contact-info">
                        <li><i class="fa-solid fa-phone"></i> <strong>Teléfono:</strong> +57 3XX XXX XXXX</li>
                        <li><i class="fa-solid fa-envelope"></i> <strong>Correo Institucional:</strong> contacto@turpaykawsay.org</li>
                        <li><i class="fa-solid fa-location-dot"></i> <strong>Ubicación:</strong> Sandoná, Nariño, Colombia</li>
                    </ul>

                    <h3>Síguenos en Redes</h3>
                    <div class="social-links">
                        <a href="#link-facebook" target="_blank" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#link-instagram" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#link-tiktok" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                        <a href="#link-youtube" target="_blank" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
                        <a href="#link-threads" target="_blank" title="Threads"><i class="fa-brands fa-threads"></i></a>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 Fundación Turpay Kawsay. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
        function toggleMainMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
        }
        function toggleDropdown(el) {
            el.classList.toggle('active');
        }
        function abrirAcordeon(id) {
            const details = document.getElementById(id);
            if (details) {
                details.open = true;
                details.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
